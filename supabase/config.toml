[analytics]
enabled = false

# verify_jwt = false on every function because our project uses ES256 (ECC P-256)
# JWT signing. The Supabase gateway only validates HS256, so it rejects all valid
# user tokens. Each function handles auth internally via the Auth REST API instead.

[functions.onboarding-chat]
enabled = true
verify_jwt = false
import_map = "./functions/onboarding-chat/deno.json"
entrypoint = "./functions/onboarding-chat/index.ts"

[functions.ai-chat]
enabled = true
verify_jwt = false
import_map = "./functions/ai-chat/deno.json"
entrypoint = "./functions/ai-chat/index.ts"

[functions.pairing-connect]
enabled = true
verify_jwt = false
import_map = "./functions/pairing-connect/deno.json"
entrypoint = "./functions/pairing-connect/index.ts"

[functions.pairing-disconnect]
enabled = true
verify_jwt = false
import_map = "./functions/pairing-disconnect/deno.json"
entrypoint = "./functions/pairing-disconnect/index.ts"

[functions.pairing-generate]
enabled = true
verify_jwt = false
import_map = "./functions/pairing-generate/deno.json"
entrypoint = "./functions/pairing-generate/index.ts"