name: Android Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: android-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Determine Android release
        id: prepare
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: npm run release:android:prepare

      - name: Stop when commit does not request a release
        if: steps.prepare.outputs.should_release != 'true'
        run: echo "No Android release token found in the latest commit message."

      - name: Commit version bump
        if: steps.prepare.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json package.json package-lock.json
          git commit -m "${{ steps.prepare.outputs.release_commit_message }}"
          git tag "${{ steps.prepare.outputs.tag }}"
          git push origin HEAD:main --follow-tags

      - name: Setup Expo and EAS
        if: steps.prepare.outputs.should_release == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.prepare.outputs.should_release == 'true'
        run: npm ci

      - name: Build Android APK with EAS
        if: steps.prepare.outputs.should_release == 'true'
        run: eas build --platform android --profile production --non-interactive --wait --json | tee build.json

      - name: Download APK artifact
        if: steps.prepare.outputs.should_release == 'true'
        run: |
          BUILD_URL="$(npm run --silent release:android:artifact-url -- build.json)"
          curl -L "$BUILD_URL" -o "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk"

      - name: Create GitHub release with APK
        if: steps.prepare.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.prepare.outputs.tag }}" \
              "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
              --clobber
          else
            gh release create "${{ steps.prepare.outputs.tag }}" \
              "CoupleGoAI-${{ steps.prepare.outputs.version }}.apk" \
              --title "${{ steps.prepare.outputs.release_name }}" \
              --generate-notes
          fi
